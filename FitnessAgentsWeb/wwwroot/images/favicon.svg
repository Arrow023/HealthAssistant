<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#fg)"/>

  <!-- Heart shape (white) -->
  <path d="M32 52 C32 52, 13 38, 13 28 C13 21, 18.5 17, 23.5 20
           C27 22, 30 25, 32 27 C34 25, 37 22, 40.5 20
           C45.5 17, 51 21, 51 28 C51 38, 32 52, 32 52Z"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ECG pulse line (white, bold) -->
  <polyline points="10,33 20,33 23,33 25,31 27,35 29,39
                    31,24 33,39 35,35 37,31 39,33 42,33 54,33"
           fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
           filter="url(#g)"/>

  <!-- Peak dot -->
  <circle cx="32" cy="24" r="1.8" fill="#fff" opacity="0.9"/>
</svg>
